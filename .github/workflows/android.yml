name: Build APK

on:
  push:
    branches: [ "main" ]  # Або master, якщо ваша головна гілка називається master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/kivy/buildozer:latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Fix Buildozer SDK Path and Pre-Accept Licenses
      run: |
        # 1. Примусово створюємо внутрішню структуру папок, яку вимагає Buildozer
        mkdir -p /github/home/.buildozer/android/platform/android-sdk/tools/bin
        mkdir -p /github/home/.buildozer/android/platform/android-sdk/licenses

        # 2. Робимо "місток" (символічне посилання) до РЕАЛЬНОГО sdkmanager, 
        # який вже встановлений авторами Kivy всередині цього Docker-контейнера
        ln -s /home/user/.android/cmdline-tools/latest/bin/sdkmanager /github/home/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager || true

        # 3. Записуємо актуальні цифрові ліцензії Google, щоб Buildozer не зупиняв роботу
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > /github/home/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo "84831b9409646a918e30573bab4c9c91346d8abd" >> /github/home/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo "6c1769a36595e6ae1e4fbee2d9931ef1130252af" >> /github/home/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo "893543563402757754d5b78ae383bc5d1792d1f0" > /github/home/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

    - name: Build APK with Buildozer
      run: |
        git config --global --add safe.directory '*'
        
        # Запускаємо збірку. Buildozer побачить підкладений sdkmanager, 
        # успішно пройде перевірку шляхів і почне компіляцію програми.
        yes | buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk

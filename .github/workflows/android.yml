name: Build APK

on:
  push:
    branches: [ "main" ]  # Або master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/kivy/buildozer:latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Android SDK Manager and Licenses via Python
      run: |
        # 1. Створюємо правильну структуру папок для ліцензій та інструментів
        mkdir -p /github/home/.buildozer/android/platform/android-sdk/cmdline-tools/latest
        mkdir -p /github/home/.buildozer/android/platform/android-sdk/licenses

        # 2. Завантажуємо та розпаковуємо утиліти Google (cmdline-tools) за допомогою вбудованого Python
        python3 -c "
        import urllib.request, zipfile, os
        url = 'https://google.com'
        print('Downloading cmdline-tools...')
        urllib.request.urlretrieve(url, '/tmp/cmdline-tools.zip')
        print('Extracting...')
        with zipfile.ZipFile('/tmp/cmdline-tools.zip', 'r') as zip_ref:
            zip_ref.extractall('/tmp/cmdline-out')
        "

        # 3. Переміщуємо розпаковані файли у правильну робочу директорію Buildozer
        mv /tmp/cmdline-out/cmdline-tools/* /github/home/.buildozer/android/platform/android-sdk/cmdline-tools/latest/
        
        # 4. Створюємо символічне посилання (місток) для застарілої перевірки Buildozer
        mkdir -p /github/home/.buildozer/android/platform/android-sdk/tools/bin
        ln -s /github/home/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager /github/home/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager

        # 5. Записуємо актуальні цифрові ліцензії Google в домашню папку контейнера
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > /github/home/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo "84831b9409646a918e30573bab4c9c91346d8abd" >> /github/home/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo "6c1769a36595e6ae1e4fbee2d9931ef1130252af" >> /github/home/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo "893543563402757754d5b78ae383bc5d1792d1f0" > /github/home/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

    - name: Build APK with Buildozer
      run: |
        git config --global --add safe.directory '*'
        
        # Запускаємо автоматичну збірку з потоком відповідей "yes"
        yes | buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
